<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística P2P - Terminal de Despacho</title>
</head>
<body style="font-family: 'Courier New', Courier, monospace; background-color: #f4f4f4; text-align: center; padding: 50px;">

    <div style="background-color: white; display: inline-block; padding: 30px; border: 2px solid #333; box-shadow: 10px 10px 0px #888;">
        <h2>📦 SISTEMA DE LOGÍSTICA P2P</h2>
        <p>Comunicação via Protocolo UDP</p>
        <hr>

        <form method="post" style="text-align: left;">
            <label><b>IP do Destinatário (Ex: 192.168.0.100):</b></label><br>
            <input type="text" name="ip" placeholder="0.0.0.0" style="width: 100%; padding: 8px; margin-top: 5px;" required>
            <br><br>

            <label><b>Descrição da Carga:</b></label><br>
            <textarea name="mensagem" placeholder="Descreva o produto..." style="width: 100%; height: 60px; margin-top: 5px;" required></textarea>
            <br><br>

            <button type="submit" formaction="/enviar" style="width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold;">
                🚀 DESPACHAR CARGA ORIGINAL
            </button>

            <br><br>

            <button type="submit" formaction="/remanejar" style="width: 100%; padding: 12px; background-color: #FFC107; color: black; border: none; cursor: pointer; font-weight: bold;">
                🔄 REMANEJAR CARGA (REPASSAR)
            </button>
        </form>

        <p style="font-size: 12px; color: #666; margin-top: 20px;">
            <i>Nota: O status do envio e o avião ASCII aparecem no terminal do VS Code.</i>
        </p>
    </div>

</body>
</html>
